schema: spec-driven

# Project context (Contexia — Agentic Performance Management)
context: |
  PROJECT: Contexia (Entidad B — APM para PyMEs colombianas)
  GROUND_TRUTH: Base-de-conocimientos-Contexia-v2.md + Ground Truth v2.0

  TECH STACK:
  - Backend: FastAPI, Python 3.11
  - Frontend: React, Next.js, Hermes Workspace
  - Database: Supabase (PostgreSQL + pgvector)
  - Deployment: Railway (production-175a), Vercel
  - APIs: Siigo, DIAN, Telegram, OpenAI/Cerebras

  ARCHITECTURE:
  - Hermes Workspace: Central dashboard orchestrator
  - 9 Agents: Centinela, Pulso, Radar, Auditoría, Taty, Social Ops, KB, Orchestrator, Approval Queue
  - HITL: Human-in-the-Loop mandatory for sensitive actions
  - Cliente Cero: Contexia is first production customer before externals

  KEY DOCUMENTS:
  - AGENTES.md: Catalog of 9 agents (specs, endpoints, HITL rules)
  - CLAUDE.md: Engineering standards (baby steps, TDD, English only, OpenSpec mandatory)
  - DEPLOYMENT_STAGE/: Stage 11 workflow (docs → design → spec → tasks → apply → deploy → archive)

  HERMES WORKSPACE INTEGRATION:
  - Source of Truth: /home/contexia/hermes-workspace/ (WSL)
  - GitHub Backup: https://github.com/jpelaezcardenas/hermes-workspace
  - Documentation:
    * AGENTS.md (English): Operational contracts, semantic worker roles, deployment rules
    * HERMES_WORKSPACE_CONTEXT.md (Spanish): Architecture overview, features, local setup guide
  - Integration Points:
    * swarm.yaml: Semantic worker roles (orchestrator, builder, reviewer, qa, etc.)
    * GBrain: Automatic indexing of both docs for agent discovery
    * Stage 11: Deployment verification required before closing changes
  - Primary Agents Orchestrated:
    * Taty: Conversational operator (fiscal, Telegram, onboarding)
    * Centinela Fiscal: DIAN alerts and tax compliance monitoring
    * Pulso Diario: Daily operational state aggregation
    * Social Ops: Pipeline, inbox, ideas, metrics, HITL approvals
    * Radar Predictivo: Risk analysis and forecasting
    * Auditoría Sombra: Automated technical auditing

  STANDARDS:
  - All code: fully typed, clear naming, deterministic (no hallucinations)
  - Spec-driven: Documentation is source of truth
  - Stage 11: Deployment is non-negotiable (commit + test + deploy + report)
  - HITL: ✅ mandatory for asientos, publicaciones, /ops, cambios críticos
  - Testing: TDD (failing tests first), E2E with Cliente Cero (real data)

# Per-artifact rules
rules:
  proposal:
    - Keep proposals under 500 words, focus on WHY
    - Always include non-goals section
    - Reference AGENTES.md for agent details

  design:
    - Explain technical decisions (WHY X over Y)
    - Include risks + trade-offs
    - Reference APM Nominal model if applicable

  specs:
    - Each requirement must have at least one scenario (#### Scenario:)
    - Use SHALL/MUST for normative requirements
    - Test cases map 1:1 from scenarios

  tasks:
    - Break into max 2-hour chunks (baby steps)
    - Each task verifiable ("done" = testable outcome)
    - No mega-commits; one task = one atomic change
    - Include Stage 11 deployment in final tasks
    - Test after each task (TDD)
