    <script>
      (function() {
        var SUPABASE_URL = "https://kpynymwghfwshvcvevxq.supabase.co";
        var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtweW55bXdnaGZ3c2h2Y3ZldnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDAwMTksImV4cCI6MjA5NDYxNjAxOX0.skNy5PKg0oFIqZD-2GyMZFTVA68OxrS1rBKkFiWAhwA";
        var ADMIN_EMAILS = new Set(["contexia.marketing@gmail.com"]);
        var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function loadReactApp() {
          var script = document.createElement('script');
          script.src = "/app/dashboard-assets/index-DblwMcm3.auth-logout-20260524.js";
          script.crossOrigin = "anonymous";
          document.head.appendChild(script);
        }

        client.auth.getSession().then(function(result) {
          var session = result && result.data && result.data.session;
          if (!session || !session.user) {
            window.location.assign("/login.html");
            return;
          }
          var normalized = String(session.user.email || "").trim().toLowerCase();
          var isAdmin = ADMIN_EMAILS.has(normalized);
          if (!isAdmin) {
            window.location.assign("/app/overview");
            return;
          }
          window.localStorage.setItem("cx_user", JSON.stringify({
            email: normalized,
            role: "admin",
            is_admin: true
          }));
          loadReactApp();
        }).catch(function(error) {
          console.error("Session check failed:", error);
          window.location.assign("/login.html");
        });
      })();
    </script>
