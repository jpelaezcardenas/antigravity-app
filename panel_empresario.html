<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contexia Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0F172A;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // Verificación de sesión antes de cargar
        const token = localStorage.getItem('contexia_token');
        if (!token) {
            window.location.href = './login.html';
        }
    </script>
</head>
<body>
    <!-- El dashboard se carga desde el subdominio dedicado -->
    <iframe src="https://app.contexia.online" title="Contexia Dashboard"></iframe>
</body>
</html>
