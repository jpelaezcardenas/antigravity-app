# Nodos Contexia — Local node deployment (MVP draft, 2026-05-27)
#
# Vision: each coworking node runs a local n8n + NAS-mock + (future) VPN tunnel
# back to the main Supabase. The node owns NO regulated data at rest — it
# proxies to the central API with anonymized payloads (SOSP).
#
# Status: DRAFT. Not yet deployed in production. Validate with:
#   docker compose -f infrastructure/nodos/docker-compose.yml config
#
# Bring up locally:
#   cd infrastructure/nodos
#   cp .env.example .env.node      # then fill values
#   docker compose up -d
#
# Tear down:
#   docker compose down -v         # -v removes the named volumes

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # n8n — local automation engine for client-specific workflows
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.74.1
    container_name: contexia-node-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=America/Bogota
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_DISABLED=false
      # Connect to central Contexia API for orchestrated workflows
      - CONTEXIA_API_URL=${CONTEXIA_API_URL:-https://api.contexia.online/api/v1}
      - CONTEXIA_CLIENT_ID=${CONTEXIA_CLIENT_ID}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro  # seed workflows (read-only)
    networks:
      - contexia_node

  # ---------------------------------------------------------------------------
  # nas-mock — Local document storage (samba/minio in production)
  # ---------------------------------------------------------------------------
  nas-mock:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: contexia-node-nas
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${NAS_ACCESS_KEY:-contexianodos}
      - MINIO_ROOT_PASSWORD=${NAS_SECRET_KEY:-changeme-set-in-env}
    command: server /data --console-address ":9001"
    volumes:
      - nas_data:/data
    networks:
      - contexia_node

  # ---------------------------------------------------------------------------
  # VPN tunnel back to central API (STUB — uncomment + configure for prod)
  # ---------------------------------------------------------------------------
  # vpn-tunnel:
  #   image: linuxserver/wireguard:1.0.20210914
  #   container_name: contexia-node-vpn
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=America/Bogota
  #   volumes:
  #     - ./wireguard:/config
  #     - /lib/modules:/lib/modules
  #   ports:
  #     - "51820:51820/udp"
  #   sysctls:
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   restart: unless-stopped
  #   networks:
  #     - contexia_node

volumes:
  n8n_data:
    name: contexia_node_n8n_data
  nas_data:
    name: contexia_node_nas_data

networks:
  contexia_node:
    name: contexia_node_net
    driver: bridge
