<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Contexia | Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #020617;
      --panel: rgba(15, 23, 42, 0.78);
      --line: rgba(45, 212, 191, 0.26);
      --teal: #2dd4bf;
      --blue: #38bdf8;
      --text: #f8fafc;
      --muted: #94a3b8;
      --danger: #fb7185;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      background:
        radial-gradient(circle at 20% 10%, rgba(45, 212, 191, 0.14), transparent 30%),
        radial-gradient(circle at 80% 90%, rgba(56, 189, 248, 0.12), transparent 28%),
        var(--navy);
      color: var(--text);
      font-family: Inter, sans-serif;
    }

    .shell {
      width: min(430px, 100%);
      display: grid;
      gap: 24px;
    }

    .logo {
      display: grid;
      place-items: center;
    }

    .logo img {
      width: min(270px, 76vw);
      filter: drop-shadow(0 0 28px rgba(45, 212, 191, 0.36));
    }

    .card {
      position: relative;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.88), rgba(2, 6, 23, 0.88));
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.08), 0 24px 80px rgba(0, 0, 0, 0.38);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(45, 212, 191, 0.72), rgba(56, 189, 248, 0.18), rgba(45, 212, 191, 0.48));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .roles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .role {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.7);
      color: var(--muted);
      padding: 12px;
      font: 700 13px Rajdhani, sans-serif;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .role.active {
      color: var(--navy);
      background: linear-gradient(135deg, var(--teal), var(--blue));
      border-color: transparent;
      box-shadow: 0 0 24px rgba(45, 212, 191, 0.22);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: var(--muted);
      font: 700 11px Rajdhani, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.58);
      color: var(--text);
      padding: 0 14px;
      font: 600 15px Inter, sans-serif;
      outline: none;
    }

    input:focus {
      border-color: rgba(45, 212, 191, 0.76);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.12);
    }

    .primary,
    .sso {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      font: 800 15px Inter, sans-serif;
      cursor: pointer;
    }

    .primary {
      margin-top: 6px;
      color: var(--navy);
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 14px 32px rgba(45, 212, 191, 0.22);
    }

    .primary:disabled {
      cursor: wait;
      opacity: 0.74;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      color: rgba(148, 163, 184, 0.72);
      margin: 20px 0;
      font: 700 11px Rajdhani, sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .split::before,
    .split::after {
      content: "";
      height: 1px;
      background: rgba(148, 163, 184, 0.16);
    }

    .sso-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sso {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.68);
      color: var(--text);
    }

    .mark {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
    }

    .ms {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }

    .ms span { width: 7px; height: 7px; display: block; }

    .msg {
      min-height: 20px;
      margin-top: 14px;
      color: var(--danger);
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="logo">
      <img src="/assets/img/logo_official_transparent.png" alt="Contexia" />
    </div>

    <section class="card" aria-label="Acceso Contexia">
      <div class="roles" role="tablist" aria-label="Tipo de acceso">
        <button class="role active" type="button" data-role="client">Cliente</button>
        <button class="role" type="button" data-role="admin">Admin</button>
      </div>

      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="usuario@empresa.com" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>

        <button id="login-button" class="primary" type="submit">Entrar</button>
      </form>

      <div class="split">SSO</div>

      <div class="sso-grid">
        <button class="sso" type="button" data-provider="google"><span class="mark">G</span>Google</button>
        <button class="sso" type="button" data-provider="azure"><span class="mark ms"><span style="background:#f25022"></span><span style="background:#7fba00"></span><span style="background:#00a4ef"></span><span style="background:#ffb900"></span></span>Microsoft</button>
      </div>

      <div id="message" class="msg" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var SUPABASE_URL = "https://kpynymwghfwshvcvevxq.supabase.co";
      var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtweW55bXdnaGZ3c2h2Y3ZldnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDAwMTksImV4cCI6MjA5NDYxNjAxOX0.skNy5PKg0oFIqZD-2GyMZFTVA68OxrS1rBKkFiWAhwA";
      var ADMIN_EMAIL = "contexia.marketing@gmail.com";
      var role = new URLSearchParams(window.location.search).get("role") || "client";
      var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      var form = document.getElementById("login-form");
      var message = document.getElementById("message");
      var button = document.getElementById("login-button");

      function setRole(nextRole) {
        role = nextRole;
        document.querySelectorAll(".role").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.role === role);
        });
      }

      function destinationFor(email) {
        var normalized = String(email || "").trim().toLowerCase();
        if (role === "admin" && normalized !== ADMIN_EMAIL) {
          throw new Error("Este correo no tiene acceso admin.");
        }
        return role === "admin" ? "/app/bunker" : "/app/overview";
      }

      function storeSession(session, email) {
        var user = {
          email: email,
          role: role,
          is_admin: String(email || "").trim().toLowerCase() === ADMIN_EMAIL
        };
        localStorage.setItem("cx_user", JSON.stringify(user));
        if (session && session.access_token) localStorage.setItem("token", session.access_token);
      }

      document.querySelectorAll(".role").forEach(function (btn) {
        btn.addEventListener("click", function () { setRole(btn.dataset.role); });
      });
      setRole(role);

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        message.textContent = "";
        button.disabled = true;
        button.textContent = "Entrando...";
        try {
          var email = document.getElementById("email").value.trim();
          var password = document.getElementById("password").value;
          var result = await client.auth.signInWithPassword({ email: email, password: password });
          if (result.error) throw result.error;
          storeSession(result.data.session, email);
          window.location.assign(destinationFor(email));
        } catch (error) {
          message.textContent = error.message || "No fue posible iniciar sesion.";
        } finally {
          button.disabled = false;
          button.textContent = "Entrar";
        }
      });

      document.querySelectorAll("[data-provider]").forEach(function (btn) {
        btn.addEventListener("click", async function () {
          message.textContent = "";
          try {
            var redirectTo = window.location.origin + "/login.html?role=" + encodeURIComponent(role) + "&oauth=1";
            var result = await client.auth.signInWithOAuth({
              provider: btn.dataset.provider,
              options: { redirectTo: redirectTo }
            });
            if (result.error) throw result.error;
          } catch (error) {
            message.textContent = error.message || "SSO no disponible.";
          }
        });
      });

      if (new URLSearchParams(window.location.search).get("oauth") === "1") {
        client.auth.getSession().then(function (result) {
          var session = result && result.data && result.data.session;
          if (!session || !session.user) return;
          storeSession(session, session.user.email);
          window.location.assign(destinationFor(session.user.email));
        }).catch(function (error) {
          message.textContent = error.message || "No fue posible completar SSO.";
        });
      }
    })();
  </script>
</body>
</html>
