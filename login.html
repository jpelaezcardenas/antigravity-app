<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Contexia</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="./js/auth.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "teal": "#2DD4BF",
                        "teal-dark": "#14B8A6",
                        "navy": "#0F172A",
                        "navy-dark": "#020617",
                        "orange": "#F97316",
                        "violet": "#8B5CF6",
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-navy-dark text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full" x-data="{ 
            username: '', 
            password: '', 
            error: '',
            loading: false,
            selectedRole: null,
            
            roles: [
                { id: 'empresario', label: 'Empresario', icon: 'store', desc: 'Acceso Empresarial', user: 'empresario', pass: 'demo' }
            ],
            
            init() {
                this.selectRole(this.roles[0]);
            },
            
            selectRole(role) {
                this.selectedRole = role;
                this.username = role.user;
                this.password = role.pass;
                this.error = '';
            },
            
            async login() {
                if (!this.username || !this.password) {
                    this.error = 'Ingresa usuario y contraseña';
                    return;
                }
                this.loading = true;
                this.error = '';
                
                try {
                    const API_URL = 'https://api.contexia.online/api/v1'; // Cambiar por URL real en deploy
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.username, password: this.password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        localStorage.setItem('contexia_token', data.token);
                        localStorage.setItem('contexia_user', JSON.stringify(data));
                        window.location.href = './panel_empresario.html';
                    } else {
                        this.error = data.detail || 'Error de autenticación';
                        this.loading = false;
                    }
                } catch (err) {
                    // Fallback para desarrollo/demo si el backend no está arriba
                    if (this.password === 'demo') {
                        localStorage.setItem('contexia_token', 'demo_token');
                        window.location.href = './panel_empresario.html';
                    } else {
                        this.error = 'Error de conexión con el servidor';
                        this.loading = false;
                    }
                }
            }
         }">
            <!-- Logo & Title -->
            <div class="text-center mb-8">
                <div class="flex items-center justify-center gap-3 mb-4">
                    <img src="./assets/img/logo.png" alt="Contexia" class="h-12 w-auto">
                    <span class="text-2xl font-bold tracking-tight">Contexia</span>
                </div>
                <p class="text-slate-400 text-sm">GPS de flujo de caja, impuestos y riesgo regulatorio</p>
            </div>

            <!-- Role Selection Cards -->
            <div class="mb-6">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 text-center">Perfil de Acceso</p>
                <div class="flex justify-center">
                    <template x-for="role in roles" :key="role.id">
                        <button @click="selectRole(role)"
                            :class="selectedRole?.id === role.id ? 'bg-teal border-teal text-white shadow-lg shadow-teal/20' : 'bg-navy border-slate-700 hover:border-teal/50'"
                            class="p-6 rounded-2xl border transition-all flex flex-col items-center gap-3 w-full max-w-[200px] group">
                            <span class="material-symbols-outlined text-3xl"
                                :class="selectedRole?.id === role.id ? 'text-white' : 'text-teal'"
                                x-text="role.icon"></span>
                            <div class="text-center">
                                <span class="text-base font-bold block" x-text="role.label"></span>
                                <span class="text-[10px] text-slate-400 uppercase tracking-wider"
                                    :class="selectedRole?.id === role.id ? 'text-white/70' : ''" x-text="role.desc"></span>
                            </div>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Login Form -->
            <div class="bg-navy rounded-2xl shadow-2xl p-6 border border-slate-700">
                <form @submit.prevent="login" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Usuario</label>
                        <input type="text" x-model="username"
                            class="w-full bg-navy-dark border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-teal focus:border-transparent transition-all outline-none"
                            placeholder="Ingresa tu usuario">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
                        <input type="password" x-model="password"
                            class="w-full bg-navy-dark border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-teal focus:border-transparent transition-all outline-none"
                            placeholder="Ingresa tu contraseña">
                    </div>

                    <!-- Error Message -->
                    <div x-show="error" x-transition
                        class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-4 py-2 rounded-lg flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">error</span>
                        <span x-text="error"></span>
                    </div>

                    <button type="submit" :disabled="loading"
                        class="w-full bg-teal hover:bg-teal-dark text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-teal/20 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span x-show="!loading">Ingresar al Dashboard</span>
                        <span x-show="loading"
                            class="size-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    </button>
                </form>

                <!-- Quick Access Hint -->
                <div class="mt-4 pt-4 border-t border-slate-700">
                    <p class="text-[10px] text-slate-500 text-center italic">
                        El acceso está configurado para el perfil <span class="text-teal font-medium">Empresario</span>
                    </p>
                </div>
            </div>

        <p class="text-center text-xs text-slate-600 mt-6">
            Contexia &bull; GPS financiero para PyMEs Latinoamericanas
        </p>

    </div>

</body>

</html>
