<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Contexia | Acceso</title>
  <!-- CANONICAL LOGIN: this is the approved SSO login. Acceso App lands here. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #020617;
      --panel: #0b1220;
      --field: #0f172a;
      --line: #334155;
      --teal: #2dd4bf;
      --cyan: #06b6d4;
      --blue: #2563eb;
      --lime: #22c55e;
      --yellow: #facc15;
      --text: #f8fafc;
      --muted: #94a3b8;
      --danger: #fca5a5;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px 14px;
      background:
        radial-gradient(circle at 24% 16%, rgba(45, 212, 191, 0.10), transparent 30%),
        radial-gradient(circle at 78% 84%, rgba(37, 99, 235, 0.12), transparent 30%),
        var(--navy);
      color: var(--text);
      font-family: Inter, sans-serif;
    }

    .shell {
      width: min(380px, 100%);
      display: grid;
      gap: 18px;
    }

    .logo-wrap {
      display: grid;
      place-items: center;
      min-height: 250px;
    }

    .logo-wrap img {
      width: min(330px, 86vw);
      height: auto;
      object-fit: contain;
      animation: logoPulse 2.8s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% {
        filter: drop-shadow(0 0 12px rgba(45, 212, 191, 0.20));
        transform: scale(1);
      }
      50% {
        filter:
          drop-shadow(0 0 28px rgba(45, 212, 191, 0.45))
          drop-shadow(0 0 40px rgba(6, 182, 212, 0.22));
        transform: scale(1.02);
      }
    }

    .frame {
      padding: 1px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--lime) 0%, var(--yellow) 30%, var(--cyan) 68%, var(--blue) 100%);
      box-shadow: 0 0 42px rgba(34, 211, 238, 0.18);
    }

    .card {
      border-radius: 6px;
      border: 1px solid rgba(15, 23, 42, 0.95);
      background: rgba(11, 18, 32, 0.96);
      padding: 22px 20px;
      color: var(--text);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.40);
    }

    .sso-stack,
    form {
      display: grid;
      gap: 8px;
    }

    .sso,
    .primary,
    input,
    .role-toggle button {
      border-radius: 4px;
      font-family: Inter, sans-serif;
    }

    .sso,
    .primary {
      width: 100%;
      min-height: 34px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      transition: transform 160ms ease, border-color 160ms ease, filter 160ms ease;
    }

    .sso {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 1px solid var(--line);
      background: #111827;
      color: var(--text);
    }

    .sso:hover {
      border-color: rgba(45, 212, 191, 0.55);
      transform: translateY(-1px);
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .ms {
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
    }

    .ms span {
      display: block;
      width: 8px;
      height: 8px;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: rgba(148, 163, 184, 0.36);
    }

    input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--field);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      outline: none;
      padding: 0 12px;
    }

    input::placeholder {
      color: #64748b;
    }

    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
    }

    .role-toggle {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 2px;
    }

    .role-toggle.visible {
      display: grid;
    }

    .role-toggle button {
      min-height: 32px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: #111827;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .role-toggle button.active {
      border-color: rgba(45, 212, 191, 0.75);
      background: rgba(45, 212, 191, 0.13);
      color: var(--teal);
    }

    .primary {
      margin-top: 2px;
      border: 0;
      min-height: 34px;
      background: linear-gradient(135deg, #0891b2 0%, var(--cyan) 48%, var(--teal) 100%);
      color: var(--navy);
      box-shadow: 0 0 22px rgba(45, 212, 191, 0.22);
    }

    .primary:hover {
      filter: brightness(1.10);
    }

    .primary:disabled,
    .sso:disabled {
      cursor: wait;
      opacity: 0.65;
      transform: none;
    }

    .links {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 800;
    }

    .links a {
      color: #cbd5e1;
      text-decoration: none;
    }

    .links a:hover {
      color: white;
      text-decoration: underline;
    }

    .msg {
      min-height: 18px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    @media (max-height: 760px) {
      .logo-wrap {
        min-height: 190px;
      }

      .logo-wrap img {
        width: min(270px, 78vw);
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Acceso Contexia">
    <div class="logo-wrap">
      <img src="/assets/img/logo_official_transparent.png" alt="Contexia" />
    </div>

    <section class="frame">
      <div class="card">
        <div class="sso-stack">
          <button class="sso" type="button" data-provider="google">
            <img class="icon" src="https://www.svgrepo.com/show/475656/google-color.svg" alt="" />
            Sign in with Google
          </button>

          <button class="sso" type="button" data-provider="azure">
            <span class="icon ms" aria-hidden="true">
              <span style="background:#f25022"></span>
              <span style="background:#7fba00"></span>
              <span style="background:#00a4ef"></span>
              <span style="background:#ffb900"></span>
            </span>
            Sign in with Microsoft
          </button>

          <button class="sso" type="button" id="email-focus">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16v16H4z"></path>
                <path d="m4 7 8 6 8-6"></path>
              </svg>
            </span>
            Sign in with Email
          </button>
        </div>

        <div class="divider">or</div>

        <form id="login-form">
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="Email" aria-label="Email" />
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Password" aria-label="Password" />
          <div id="role-toggle" class="role-toggle" aria-label="Modo para admin">
            <button class="active" type="button" data-role="client">Cliente</button>
            <button type="button" data-role="admin">Admin</button>
          </div>
          <button id="login-button" class="primary" type="submit">Log In</button>
        </form>

        <div class="links">
          <a href="https://wa.me/573018948151?text=Hola,%20quiero%20solicitar%20acceso%20a%20Contexia" target="_blank" rel="noopener noreferrer">No account? Sign up</a>
          <a href="https://wa.me/573018948151?text=Hola,%20necesito%20recuperar%20mi%20acceso%20a%20Contexia" target="_blank" rel="noopener noreferrer">Forgot password?</a>
        </div>

        <div id="message" class="msg" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var SUPABASE_URL = "https://kpynymwghfwshvcvevxq.supabase.co";
      var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtweW55bXdnaGZ3c2h2Y3ZldnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDAwMTksImV4cCI6MjA5NDYxNjAxOX0.skNy5PKg0oFIqZD-2GyMZFTVA68OxrS1rBKkFiWAhwA";
      var ADMIN_EMAIL = "contexia.marketing@gmail.com";
      var role = new URLSearchParams(window.location.search).get("role") || "client";
      var form = document.getElementById("login-form");
      var message = document.getElementById("message");
      var button = document.getElementById("login-button");
      var emailInput = document.getElementById("email");
      var roleToggle = document.getElementById("role-toggle");
      var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      function normalizeEmail(email) {
        return String(email || "").trim().toLowerCase();
      }

      function isAdminEmail(email) {
        return normalizeEmail(email) === ADMIN_EMAIL;
      }

      function setBusy(isBusy, label) {
        button.disabled = isBusy;
        button.textContent = label || "Log In";
        document.querySelectorAll(".sso").forEach(function (btn) { btn.disabled = isBusy; });
      }

      function setRole(nextRole) {
        role = nextRole === "admin" ? "admin" : "client";
        document.querySelectorAll("[data-role]").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.role === role);
        });
      }

      function syncRoleVisibility() {
        var visible = isAdminEmail(emailInput.value);
        roleToggle.classList.toggle("visible", visible);
        if (!visible && role === "admin") setRole("client");
      }

      function destinationFor(email) {
        if (role === "admin" && !isAdminEmail(email)) {
          throw new Error("Este correo no tiene acceso admin.");
        }
        return role === "admin" ? "/app/bunker" : "/app/overview";
      }

      function storeSession(session, email) {
        var normalized = normalizeEmail(email);
        localStorage.setItem("cx_user", JSON.stringify({
          email: normalized,
          role: role,
          is_admin: normalized === ADMIN_EMAIL
        }));
        if (session && session.access_token) localStorage.setItem("token", session.access_token);
      }

      document.querySelectorAll("[data-role]").forEach(function (btn) {
        btn.addEventListener("click", function () { setRole(btn.dataset.role); });
      });

      document.getElementById("email-focus").addEventListener("click", function () {
        emailInput.focus();
      });

      emailInput.addEventListener("input", syncRoleVisibility);

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        message.textContent = "";
        setBusy(true, "...");
        try {
          var email = emailInput.value.trim();
          var result = await client.auth.signInWithPassword({
            email: email,
            password: document.getElementById("password").value
          });
          if (result.error) throw result.error;
          storeSession(result.data.session, email);
          window.location.assign(destinationFor(email));
        } catch (error) {
          message.textContent = error.message || "No fue posible iniciar sesion.";
        } finally {
          setBusy(false);
        }
      });

      document.querySelectorAll("[data-provider]").forEach(function (btn) {
        btn.addEventListener("click", async function () {
          message.textContent = "";
          setBusy(true, "...");
          try {
            var redirectTo = window.location.origin + "/login.html?role=" + encodeURIComponent(role) + "&oauth=1";
            var result = await client.auth.signInWithOAuth({
              provider: btn.dataset.provider,
              options: { redirectTo: redirectTo }
            });
            if (result.error) throw result.error;
          } catch (error) {
            message.textContent = error.message || "SSO no disponible.";
            setBusy(false);
          }
        });
      });

      setRole(role);
      syncRoleVisibility();

      if (new URLSearchParams(window.location.search).get("oauth") === "1") {
        client.auth.getSession().then(function (result) {
          var session = result && result.data && result.data.session;
          if (!session || !session.user) return;
          storeSession(session, session.user.email);
          window.location.assign(destinationFor(session.user.email));
        }).catch(function (error) {
          message.textContent = error.message || "No fue posible completar SSO.";
        });
      }
    })();
  </script>
</body>
</html>
