<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Contexia</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="shortcut icon" href="/favicon-v2.png">
    <meta name="theme-color" content="#2DD4BF">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="./js/auth.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "teal": "#2DD4BF",
                        "teal-dark": "#14B8A6",
                        "navy": "#0F172A",
                        "navy-dark": "#020617",
                        "orange": "#F97316",
                        "violet": "#8B5CF6",
                    },
                    fontFamily: {
                        'rajdhani': ['Rajdhani', 'sans-serif'],
                        'orbitron': ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(45, 212, 191, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            min-height: 100vh;
        }
        .logo-glow {
            filter: drop-shadow(0 0 20px rgba(45, 212, 191, 0.25));
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(45, 212, 191, 0.15);
        }
        .role-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-card.selected {
            background: linear-gradient(135deg, #2DD4BF 0%, #14B8A6 100%);
            box-shadow: 0 0 30px -5px rgba(45, 212, 191, 0.4);
        }
        .label-caps {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
        }
    </style>
</head>

<body class="text-white flex items-center justify-center p-4">

    <div class="max-w-sm w-full" x-data="{
            username: '',
            password: '',
            error: '',
            loading: false,
            selectedRole: null,

            roles: [
                { id: 'empresario', label: 'Empresario', icon: 'store', desc: 'Tu negocio', user: 'contexia.marketing', pass: 'demo' },
                { id: 'admin', label: 'Admin', icon: 'shield_person', desc: 'Equipo Contexia', user: 'admin', pass: 'demo' }
            ],

            init() {
                this.selectRole(this.roles[0]);
            },

            selectRole(role) {
                this.selectedRole = role;
                this.username = role.user;
                this.password = role.pass;
                this.error = '';
            },

            async login() {
                if (!this.username || !this.password) {
                    this.error = 'Falta tu usuario o contraseña';
                    return;
                }
                this.loading = true;
                this.error = '';

                const mockUser = {
                    usuario_id: this.selectedRole?.id === 'admin' ? 'usr_admin_001' : 'usr_001',
                    token: 'mock-jwt-token-contexia-2024',
                    nombre_empresa: this.selectedRole?.id === 'admin' ? 'Contexia Admin' : 'Contexia Marketing',
                    email: this.username,
                    role: this.selectedRole?.id,
                    plan: 'starter'
                };

                setTimeout(() => {
                    localStorage.setItem('token', mockUser.token);
                    localStorage.setItem('cx_user', JSON.stringify(mockUser));
                    const destination = this.selectedRole?.id === 'admin' ? '/app/bunker' : '/app/overview';
                    window.location.href = destination;
                }, 600);
            }
         }">

        <!-- Logo & Brand -->
        <div class="text-center mb-10">
            <div class="flex items-center justify-center mb-2">
                <img src="/assets/img/logo_official.png"
                     alt="Contexia"
                     class="h-28 w-auto logo-glow"
                     style="mix-blend-mode: screen;">
            </div>
            <p class="label-caps text-[10px] text-teal mt-1">
                GPS Financiero · Cash Flow & Tax Risk
            </p>
        </div>

        <!-- Role Selection -->
        <div class="mb-6">
            <p class="label-caps text-[10px] text-slate-500 mb-4 text-center">
                ¿Quién entra?
            </p>
            <div class="grid grid-cols-2 gap-3">
                <template x-for="role in roles" :key="role.id">
                    <button @click="selectRole(role)"
                        :class="selectedRole?.id === role.id ? 'role-card selected border-transparent' : 'bg-white/[0.03] border-white/10 hover:border-teal/30'"
                        class="role-card p-4 rounded-2xl border flex flex-col items-center gap-2 group">
                        <span class="material-symbols-outlined text-2xl"
                            :class="selectedRole?.id === role.id ? 'text-navy-dark' : 'text-teal'"
                            x-text="role.icon"></span>
                        <div class="text-center">
                            <span class="text-sm font-bold block leading-tight"
                                :class="selectedRole?.id === role.id ? 'text-navy-dark' : 'text-white'"
                                x-text="role.label"></span>
                            <span class="label-caps text-[9px] block mt-0.5"
                                :class="selectedRole?.id === role.id ? 'text-navy-dark/70' : 'text-slate-500'"
                                x-text="role.desc"></span>
                        </div>
                    </button>
                </template>
            </div>
        </div>

        <!-- Login Form Card -->
        <div class="glass-card rounded-2xl p-6 shadow-2xl">
            <form @submit.prevent="login" class="space-y-4">
                <div>
                    <label class="label-caps text-[10px] text-slate-400 block mb-2">Usuario</label>
                    <input type="text" x-model="username"
                        class="w-full bg-navy-dark/80 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-teal/50 focus:border-teal/50 transition-all outline-none placeholder-slate-600"
                        placeholder="tu.usuario">
                </div>
                <div>
                    <label class="label-caps text-[10px] text-slate-400 block mb-2">Contraseña</label>
                    <input type="password" x-model="password"
                        class="w-full bg-navy-dark/80 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-teal/50 focus:border-teal/50 transition-all outline-none placeholder-slate-600"
                        placeholder="••••••••">
                </div>

                <!-- Error Message -->
                <div x-show="error" x-transition
                    class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-2.5 rounded-xl flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">error</span>
                    <span x-text="error"></span>
                </div>

                <button type="submit" :disabled="loading"
                    class="w-full bg-gradient-to-r from-teal to-teal-dark hover:from-teal-dark hover:to-teal text-navy-dark font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-teal/20 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed mt-2">
                    <span x-show="!loading">Entrar</span>
                    <span x-show="loading"
                        class="size-5 border-2 border-navy-dark/30 border-t-navy-dark rounded-full animate-spin"></span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-[10px] text-slate-600 mt-8 label-caps">
            Tu amiga contadora · 24/7
        </p>

    </div>

</body>

</html>
